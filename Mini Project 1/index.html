<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Unit & Currency Converter</title>
    <style>
        :root {
            --primary-color: #223079;
            --background: #4d5a9c;
            --card-bg: #a3b0f3;
            --text-main: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--background);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .converter-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: #e5e7eb;
            cursor: pointer;
            font-weight: 600;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .converter-section {
            display: none;
        }

        .converter-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
        }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #eeeffe;
            border-left: 5px solid var(--primary-color);
            border-radius: 4px;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="converter-card">
    <h2>Multi-Converter</h2>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('length')">Length</button>
        <button class="tab-btn" onclick="switchTab('currency')">Currency (Live)</button>
    </div>

    <div id="length-section" class="converter-section active">
        <div class="input-group">
            <label>Amount / Value</label>
            <input type="number" id="length-input" value="1" oninput="convertLength()">
        </div>
        <div class="input-group">
            <label>From</label>
            <select id="length-from" onchange="convertLength()">
                <option value="m">Meters (m)</option>
                <option value="km">Kilometers (km)</option>
                <option value="mi">Miles (mi)</option>
            </select>
        </div>
        <div class="input-group">
            <label>To</label>
            <select id="length-to" onchange="convertLength()">
                <option value="m">Meters (m)</option>
                <option value="km" selected>Kilometers (km)</option>
                <option value="mi">Miles (mi)</option>
            </select>
        </div>
        <div class="result-box" id="length-result">1 m = 0.001 km</div>
    </div>

    <div id="currency-section" class="converter-section">
        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="currency-input" value="1" oninput="convertCurrency()">
        </div>
        <div class="input-group">
            <label>From</label>
            <select id="currency-from" onchange="convertCurrency()">
                <option value="USD" selected>USD - US Dollar</option>
                <option value="INR">INR - Indian Rupee</option>
                <option value="EUR">EUR - Euro</option>
            </select>
        </div>
        <div class="input-group">
            <label>To</label>
            <select id="currency-to" onchange="convertCurrency()">
                <option value="INR" selected>INR - Indian Rupee</option>
                <option value="USD">USD - US Dollar</option>
                <option value="EUR">EUR - Euro</option>
            </select>
        </div>
        <div class="result-box" id="currency-result">Fetching live rates...</div>
    </div>
</div>

<script>
    // Tab Switching Logic
    function switchTab(tabName) {
        document.querySelectorAll('.converter-section').forEach(sec => sec.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        if(tabName === 'length') {
            document.getElementById('length-section').classList.add('active');
            event.target.classList.add('active');
        } else {
            document.getElementById('currency-section').classList.add('active');
            event.target.classList.add('active');
            convertCurrency(); // Fetch rates immediately when switching
        }
    }

    // 1. Length Conversion Logic (Formula Calculations)
    function convertLength() {
        const val = parseFloat(document.getElementById('length-input').value) || 0;
        const from = document.getElementById('length-from').value;
        const to = document.getElementById('length-to').value;
        
        // Base unit: Meters
        let meters = val;
        if (from === 'km') meters = val * 1000;
        if (from === 'mi') meters = val * 1609.34;

        // Convert from Meters to Target
        let result = meters;
        if (to === 'km') result = meters / 1000;
        if (to === 'mi') result = meters / 1609.34;

        document.getElementById('length-result').innerText = `${val} ${from} = ${result.toFixed(4)} ${to}`;
    }

    // 2. Live Currency Conversion Logic (Fetch API)
    async function convertCurrency() {
        const amount = parseFloat(document.getElementById('currency-input').value) || 0;
        const from = document.getElementById('currency-from').value;
        const to = document.getElementById('currency-to').value;
        const resultDiv = document.getElementById('currency-result');

        if(from === to) {
            resultDiv.innerText = `${amount} ${from} = ${amount} ${to}`;
            return;
        }

        resultDiv.innerText = "Updating rates...";

        try {
            // Using a free, no-auth exchange rate API
            const response = await fetch(`https://open.er-api.com/v6/latest/${from}`);
            const data = await response.json();
            
            if(data.result === "success") {
                const rate = data.rates[to];
                const total = amount * rate;
                resultDiv.innerText = `${amount} ${from} = ${total.toFixed(2)} ${to}`;
            } else {
                resultDiv.innerText = "Error fetching rates.";
            }
        } catch (error) {
            resultDiv.innerText = "Network error. Try again.";
            console.error("API Error:", error);
        }
    }
</script>
</body>
</html>
